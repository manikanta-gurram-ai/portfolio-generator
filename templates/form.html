<!DOCTYPE html>
<html>
<head>
    <title>Create Portfolio - Portify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(135deg,#e0f2fe,#f8fafc,#ffffff); min-height:100vh; display:flex; justify-content:center; align-items:center; font-family:Poppins,sans-serif;">

<div style="width:550px;background:white;padding:35px;border-radius:20px;box-shadow:0 25px 60px rgba(0,0,0,0.15);">

    <h3 class="text-center text-primary">Create Your Portfolio</h3>
    <p class="text-center text-muted mb-4">Fill details and generate instantly 🚀</p>

    <form method="POST" action="/generate" enctype="multipart/form-data">

        <input name="name" class="form-control mb-3" placeholder="Your Name" required>
        <input name="about" class="form-control mb-3" placeholder="About You" required>
        <input name="skills" class="form-control mb-3" placeholder="Skills (comma separated)" required>
        <input name="projects" class="form-control mb-3" placeholder="Projects" required>
        <input name="contact" class="form-control mb-3" placeholder="Contact Info" required>

        <input type="file" name="photo" class="form-control mb-3">

        <input name="github" class="form-control mb-2" placeholder="GitHub URL">
        <input name="instagram" class="form-control mb-2" placeholder="Instagram URL">
        <input name="linkedin" class="form-control mb-3" placeholder="LinkedIn URL">

        <button class="btn btn-primary w-100">Generate Portfolio 🚀</button>

    </form>
</div>

</body>
</html>
