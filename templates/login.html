<!DOCTYPE html>
<html>
<head>
    <title>Portify Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

<div class="card shadow-lg border-0" style="width: 380px; border-radius: 20px;">
    
    <div class="card-body p-4">
        <h3 class="text-center text-primary mb-3">🚀 Insta Portfolio</h3>
        <p class="text-center text-muted mb-4">Build your portfolio in seconds</p>

        <form method="POST" action="/login">
            <input name="email" class="form-control mb-3" placeholder="Enter Email" required>
            <input name="password" type="password" class="form-control mb-3" placeholder="Enter Password" required>
            <button class="btn btn-primary w-100">Login</button>
        </form>

        <p class="text-center text-muted mt-3" style="font-size: 12px;">
            Simple • Fast • Free
        </p>
    </div>
</div>

</body>
</html>
