<!DOCTYPE html>
<html>
<head>
    <title>{{name}} Portfolio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: radial-gradient(circle at top, #1a0b2e, #05010a);
            color: white;
            font-family: 'Poppins', sans-serif;
        }

        .hero {
            text-align: center;
            padding: 70px 20px 30px;
        }

        .profile-pic {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid #c084fc;
            box-shadow: 0 0 30px rgba(192,132,252,0.8);
            margin-bottom: 15px;
        }

        .hero h1 {
            font-size: 44px;
            font-weight: bold;
            background: linear-gradient(90deg, #c084fc, #f472b6);
            -webkit-background-clip: text;
            color: transparent;
        }

        .glass-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .section-title {
            color: #f472b6;
        }

        .social-icons a {
            color: #c084fc;
            font-size: 22px;
            margin: 0 10px;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<div class="container hero">

    {% if photo %}
    <img src="{{ url_for('static', filename='uploads/' + photo) }}" class="profile-pic">
    {% else %}
    <img src="https://i.pravatar.cc/300" class="profile-pic">
    {% endif %}

    <h1>{{name}}</h1>
    <p class="text-light opacity-75">{{about}}</p>

    <div class="social-icons mt-3">
        {% if github %}
        <a href="{{github}}" target="_blank"><i class="fab fa-github"></i></a>
        {% endif %}

        {% if linkedin %}
        <a href="{{linkedin}}" target="_blank"><i class="fab fa-linkedin"></i></a>
        {% endif %}

        {% if instagram %}
        <a href="{{instagram}}" target="_blank"><i class="fab fa-instagram"></i></a>
        {% endif %}

        <a href="mailto:{{contact}}"><i class="fas fa-envelope"></i></a>
    </div>
</div>

<div class="container mt-4">
    <div class="row g-4">
        <div class="col-md-6">
            <h5 class="section-title">Skills</h5>
            <div class="glass-card">{{skills}}</div>
        </div>

        <div class="col-md-6">
            <h5 class="section-title">Projects</h5>
            <div class="glass-card">{{projects}}</div>
        </div>

        <div class="col-md-12">
            <h5 class="section-title">Contact</h5>
            <div class="glass-card">{{contact}}</div>
        </div>
    </div>
</div>

<!-- 🔗 SHARE SECTION -->
<div class="text-center mt-5">
    <p class="text-light opacity-75">Share Your Portfolio 🔗</p>

    <input id="portfolioLink"
           class="form-control text-center"
           value="{{ request.url }}"
           readonly
           style="max-width:400px;margin:auto;">

    <button onclick="copyLink()" class="btn btn-success mt-3 px-4">
        🔗 Copy Portfolio Link
    </button>
</div>

<footer>
    Portfolio Generator — RTRP Project | AI & DS Team 🚀
</footer>

<script>
function copyLink() {
    var copyText = document.getElementById("portfolioLink");
    copyText.select();
    document.execCommand("copy");
    alert("Portfolio link copied! 🚀");
}
</script>

</body>
</html>
